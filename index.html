<!DOCTYPE html>
<html>
<head>
<title>Tractor Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
font-family:'Segoe UI', sans-serif;
margin:0;
padding:0;
background: linear-gradient(135deg, #1e3c72, #2a5298);
min-height:100vh;
color:white;

/* PAGE LOAD ANIMATION */
opacity:0;
animation:fadeIn 1s ease-in forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* DATE TIME */
.datetime{
position:fixed;
top:10px;
right:15px;
font-size:13px;
background:rgba(0,0,0,0.3);
padding:6px 10px;
border-radius:8px;
z-index:999;
}

/* CONTAINER */
.container{
width:90%;
max-width:450px;
margin:80px auto;
background: rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
backdrop-filter: blur(12px);
box-shadow:0 8px 25px rgba(0,0,0,0.3);
animation:slideUp 1s ease;
}

@keyframes slideUp{
from{transform:translateY(50px); opacity:0;}
to{transform:translateY(0); opacity:1;}
}

/* HEADING */
h2{
text-align:center;
margin-bottom:20px;
animation:zoomIn 1s ease;
}

@keyframes zoomIn{
from{transform:scale(0.5); opacity:0;}
to{transform:scale(1); opacity:1;}
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
background:#ff4b2b;
color:white;
border:none;
font-size:16px;
cursor:pointer;
border-radius:12px;
transition:0.3s;
font-weight:bold;
}

button:hover{
background:white;
color:#ff4b2b;
transform:scale(1.05);
}

button:active{
transform:scale(0.95);
}

/* BACK BUTTON */
.back-btn{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
padding:12px 18px;
border-radius:30px;
font-size:14px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.back-btn:hover{
transform:scale(1.1);
}

.back-btn:active{
transform:scale(0.9);
}

/* RESPONSIVE */
@media(max-width:500px){
.container{
margin:60px 15px;
}
}

</style>
</head>

<body>

<!-- DATE TIME -->
<div class="datetime" id="datetime">Loading...</div>

<div class="container">

<h2>🚜 PRE-BOOK YOUR TRACTOR IN ADVANCE</h2>

<form id="jobForm">

<label>Customer Name</label>
<input type="text" name="name" required>

<label>Phone Number</label>
<input type="text" name="father" required>

<label>Pickup Point</label>
<input type="text" name="mother">

<label>Drop Off</label>
<input type="text" name="phone" required>

<label>Booking Date</label>
<input type="date" name="dob">

<label>কিয় লাগে</label>
<select name="qualification">
<option>ধান মৰোৱা</option>
<option>সামগ্ৰী কঢ়িয়াই নিয়া</option>
<option>মাটি চাষ কৰা</option>
</select>

<button type="submit">Submit Booking</button>

</form>

</div>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="window.open('https://jituloying1.github.io/pathaidemainmenue/')">⬅ Back</button>

<script>

/* LIVE DATE TIME */
function updateTime(){
let now = new Date();
let date = now.toLocaleDateString();
let time = now.toLocaleTimeString();
document.getElementById("datetime").innerHTML = date + " | " + time;
}

updateTime();
setInterval(updateTime,1000);

/* BACK BUTTON WITH ANIMATION */
function goBack(){
document.body.style.opacity="0";
document.body.style.transition="0.5s";

setTimeout(()=>{
window.history.back();
},500);
}

/* FORM SUBMIT */
const scriptURL="https://script.google.com/macros/s/AKfycbyTMyosGRCbiOeI6OX1sepijsMkGzCHAASsylLUFWWQlSST4pEde055gER7_M0wbXDV/exec";

const form=document.getElementById("jobForm");

form.addEventListener("submit",e=>{
e.preventDefault();

let formData=new FormData(form);

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{
alert("Booking Submitted Successfully 🚜");
form.reset();
})
.catch(error=>{
alert("Submission Error");
console.log(error);
});

});

</script>

</body>
</html>
